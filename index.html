<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CEPSE - Cámara Provincial de Economía Popular y Solidaria de Esmeraldas</title>
    <link rel="icon" type="image/x-icon" href="img/icon.ico">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap"
        rel="stylesheet" />

    <!-- Configuración de Tailwind -->
    <script id="tailwind-config" src="js/config.js"></script>

    <!-- Estilos principales -->
    <link rel="stylesheet" href="css/main.css">

    <style>
        /* Estilos críticos para carga rápida */
        body {
            background-color: #ffffff;
        }
    </style>
</head>

<body class="font-display text-slate-900 min-h-screen relative">

    <canvas id="grid-canvas"></canvas>

    <!-- Header -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <main class="relative z-10">
        <!-- Hero Section -->
        <div id="hero-container"></div>

        <!-- About Section -->
        <div id="about-container"></div>

        <!-- What We Do Section -->
        <div id="what-we-do-container"></div>

        <!-- Services Section -->
        <div id="services-container"></div>

        <!-- Benefits Section -->
        <div id="benefits-container"></div>

        <!-- Impact Section -->
        <div id="impact-container"></div>

        <!-- Mission Vision Section -->
        <div id="mission-vision-container"></div>

        <!-- Stats Section -->
        <div id="stats-container"></div>

        <!-- FAQ Section -->
        <div id="faq-container"></div>

        <!-- Contact Section -->
        <div id="contact-container"></div>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Modal de Registro -->
    <div id="register-modal" class="modal">
        <div class="modal-content max-w-lg">
            <button id="close-modal" class="modal-close">
                <span class="material-symbols-outlined">close</span>
            </button>
            
            <h2 class="text-3xl font-black text-slate-900 mb-2">Solicitar Afiliación</h2>
            <p class="text-slate-600 mb-8">Completa el formulario para que nos pongamos en contacto contigo.</p>

            <form id="register-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Nombre Completo *</label>
                    <input
                        type="text"
                        name="name"
                        required
                        class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 px-4 py-3 focus:border-primary focus:bg-white transition-all"
                        placeholder="Tu nombre completo" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Nombre de tu Organización *</label>
                    <input
                        type="text"
                        name="organization"
                        required
                        class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 px-4 py-3 focus:border-primary focus:bg-white transition-all"
                        placeholder="Nombre de tu organización" />
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-3">Email *</label>
                        <input
                            type="email"
                            name="email"
                            required
                            class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 px-4 py-3 focus:border-primary focus:bg-white transition-all"
                            placeholder="tu@email.com" />
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-3">Teléfono</label>
                        <input
                            type="tel"
                            name="phone"
                            class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 px-4 py-3 focus:border-primary focus:bg-white transition-all"
                            placeholder="+593 9 XXXXXXXX" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Tipo de Organización *</label>
                    <select name="type" required class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 px-4 py-3 focus:border-primary">
                        <option value="">Selecciona una opción</option>
                        <option value="asociacion">Asociación</option>
                        <option value="cooperativa">Cooperativa</option>
                        <option value="emprendimiento">Emprendimiento</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Sector Productivo *</label>
                    <select name="sector" required class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 px-4 py-3 focus:border-primary">
                        <option value="">Selecciona tu sector</option>
                        <option value="agricultura">Agricultura</option>
                        <option value="artesania">Artesanía</option>
                        <option value="comercio">Comercio y Servicios</option>
                        <option value="transformacion">Transformación de Productos</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">¿Estás registrado ante la SEPS?</label>
                    <div class="flex gap-6">
                        <label class="flex items-center gap-2">
                            <input type="radio" name="seps" value="si" class="w-4 h-4 accent-primary" />
                            <span class="text-slate-700">Sí</span>
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="radio" name="seps" value="no" class="w-4 h-4 accent-primary" />
                            <span class="text-slate-700">No</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Mensaje adicional</label>
                    <textarea
                        name="message"
                        rows="3"
                        class="w-full rounded-xl border-2 border-slate-200 bg-slate-50 px-4 py-3 focus:border-primary focus:bg-white transition-all resize-none"
                        placeholder="Cuéntanos más sobre tu organización..."></textarea>
                </div>

                <div class="flex items-center gap-3">
                    <input type="checkbox" id="modal-terms" name="terms" required class="w-4 h-4 accent-primary rounded"/>
                    <label for="modal-terms" class="text-sm text-slate-600">
                        Acepto los términos y la política de privacidad de CEPSE
                    </label>
                </div>

                <button
                    type="submit"
                    class="btn-primary w-full py-4 text-lg font-bold shadow-lg hover:shadow-xl transition-all">
                    Enviar Solicitud
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts de componentes -->
    <script>
        // Función para cargar archivos HTML
        async function loadComponent(containerId, filePath) {
            try {
                const response = await fetch(filePath);
                const html = await response.text();
                document.getElementById(containerId).innerHTML = html;
            } catch (error) {
                console.error(`Error cargando ${filePath}:`, error);
            }
        }

        // Cargar todos los componentes
        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('header-container', 'components/header.html');
            loadComponent('hero-container', 'components/hero.html');
            loadComponent('about-container', 'components/about.html');
            loadComponent('what-we-do-container', 'components/what-we-do.html');
            loadComponent('services-container', 'components/services.html');
            loadComponent('benefits-container', 'components/benefits.html');
            loadComponent('impact-container', 'components/impact.html');
            loadComponent('mission-vision-container', 'components/mission-vision.html');
            loadComponent('stats-container', 'components/stats.html');
            loadComponent('faq-container', 'components/faq.html');
            loadComponent('contact-container', 'components/contact.html');
            loadComponent('footer-container', 'components/footer.html');
        });
    </script>

    <!-- Script del Grid Interactivo -->
    <script src="js/grid.js"></script>

    <!-- Scripts de Interacción -->
    <script src="js/interactions.js"></script>

</body>

</html>
